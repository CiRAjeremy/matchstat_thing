name: Scrape Predictions & Odds

on:
  schedule:
    # Strategic timing based on tennis match schedules worldwide
    - cron: '0 6 * * *'   # 6:00 AM UTC (9:00 AM EAT) - Catch overnight predictions
    - cron: '0 10 * * *'  # 10:00 AM UTC (1:00 PM EAT) - Pre-afternoon check
    - cron: '0 13 * * *'  # 1:00 PM UTC (4:00 PM EAT) - Prime prediction time
    - cron: '0 16 * * *'  # 4:00 PM UTC (7:00 PM EAT) - Evening predictions
    - cron: '0 20 * * *'  # 8:00 PM UTC (11:00 PM EAT) - Late night predictions
  workflow_dispatch:     # Manual trigger button

jobs:
  scrape-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run prediction scraper (Grok AI)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL: INFO
        run: |
          python run_predictions_scraper.py
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: prediction-scraper-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
