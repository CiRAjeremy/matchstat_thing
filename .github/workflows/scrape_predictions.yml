name: Scrape Predictions & Odds

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 PM UTC (3:00 PM EAT) - Afternoon predictions
    - cron: '0 15 * * *'  # 3:00 PM UTC (6:00 PM EAT) - Evening backup
  workflow_dispatch:     # Manual trigger button

jobs:
  scrape-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
      
      - name: Run prediction scraper (Selenium)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
        run: |
          python -m src.scrapers.matchstat_selenium
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: prediction-scraper-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
